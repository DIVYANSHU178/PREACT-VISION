<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREACT VISION - User Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --accent: #3b82f6;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --normal: #22c55e;
            --low: #84cc16;
            --medium: #eab308;
            --high: #f97316;
            --critical: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* ================= TOP BAR ================= */
        .header {
            height: 70px;
            background: #111827;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #374151;
            position: sticky; top: 0; z-index: 100;
        }
        .header h1 { font-family: 'Poppins', sans-serif; font-size: 1.5rem; letter-spacing: 2px; color: var(--accent); }
        .header-controls { display: flex; align-items: center; gap: 25px; }
        .live-indicator { background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; border: 1px solid #ef4444; }
        .learning-toggle { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; }
        .user-info { display: flex; align-items: center; gap: 10px; border-left: 1px solid #374151; padding-left: 20px; }
        .btn-icon { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        .btn-icon:hover { color: white; }

        /* ================= MAIN LAYOUT ================= */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 25px;
            padding: 25px;
            max-width: 1800px;
            margin: 0 auto;
        }

        /* ================= CAMERA GRID ================= */
        .camera-section h2 { font-size: 1.1rem; margin-bottom: 20px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .camera-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .camera-card { background: var(--bg-card); border-radius: 12px; overflow: hidden; border: 1px solid #334155; transition: 0.3s; }
        .camera-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .cam-header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); }
        .cam-name { font-weight: 600; font-size: 0.9rem; }
        .cam-feed { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; }
        .cam-feed img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .cam-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 15px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }
        .behavior-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .threat-bar-wrap { height: 6px; background: #334155; border-radius: 3px; overflow: hidden; display: flex; }
        .threat-bar { height: 100%; transition: 0.5s width ease; }

        /* ================= THREAT PANEL ================= */
        .threat-panel { background: #1e293b; border-radius: 16px; padding: 30px; border: 1px solid #334155; position: sticky; top: 95px; height: fit-content; }
        .threat-panel h2 { font-size: 0.9rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 30px; text-align: center; }
        
        .gauge-container { width: 220px; height: 110px; margin: 0 auto 20px; position: relative; overflow: hidden; }
        .gauge-body { width: 220px; height: 220px; border-radius: 50%; border: 15px solid #334155; position: absolute; }
        .gauge-fill { width: 220px; height: 220px; border-radius: 50%; border: 15px solid var(--accent); position: absolute; clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%); transform: rotate(0deg); transition: 1s transform; }
        .gauge-value { position: absolute; bottom: 0; width: 100%; text-align: center; font-size: 2.2rem; font-weight: 700; font-family: 'Poppins'; }
        
        .threat-status { text-align: center; margin-bottom: 25px; }
        .status-label { font-size: 1.2rem; font-weight: 700; color: var(--accent); text-transform: uppercase; }
        .factor-breakdown { font-size: 0.75rem; color: var(--text-dim); font-family: monospace; background: #0f172a; padding: 10px; border-radius: 6px; margin-top: 15px; }

        .trend-chart { margin-top: 30px; height: 120px; }

        /* ================= ALERTS TABLE ================= */
        .bottom-section { grid-column: 1 / -1; margin-top: 10px; background: var(--bg-card); border-radius: 16px; padding: 25px; border: 1px solid #334155; }
        .bottom-section h2 { font-size: 1.1rem; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .alerts-table { width: 100%; border-collapse: collapse; }
        .alerts-table th { text-align: left; padding: 12px; border-bottom: 1px solid #334155; color: var(--text-dim); font-size: 0.85rem; text-transform: uppercase; }
        .alerts-table td { padding: 15px 12px; border-bottom: 1px solid #1e293b; font-size: 0.9rem; }
        .level-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
        .btn-action { padding: 6px 12px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; cursor: pointer; font-size: 0.8rem; margin-right: 5px; transition: 0.2s; }
        .btn-action:hover { background: var(--accent); border-color: var(--accent); }
        .btn-dismiss { color: var(--normal); }
        .btn-dismiss:hover { background: var(--normal); color: white; border-color: var(--normal); }

        /* Switch Toggle */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Colors for scores */
        .score-normal { color: var(--normal); }
        .score-low { color: var(--low); }
        .score-medium { color: var(--medium); }
        .score-high { color: var(--high); }
        .score-critical { color: var(--critical); }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <header class="header">
        <h1>PREACT VISION</h1>
        <div class="header-controls">
            <div class="learning-toggle">
                <span>Learning Mode</span>
                <label class="switch">
                    <input type="checkbox" id="learningToggle">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="live-indicator"><i class="fas fa-circle"></i> LIVE FEED</div>
            <div class="user-info">
                <button class="btn-icon"><i class="fas fa-bell"></i></button>
                <span id="userName" style="font-weight: 600; margin-left: 10px;">Operator</span>
                <button id="logoutBtn" class="btn-icon" style="margin-left: 15px;"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </header>

    <div class="dashboard-grid">
        <!-- LEFT: CAMERA GRID -->
        <div class="camera-section">
            <h2>Spatial Monitoring Grid</h2>
            <div class="camera-grid" id="liveCameraGrid">
                <!-- Camera cards inserted by JS -->
                <div style="padding: 40px; text-align: center; grid-column: 1/-1;">Initialising vision streams...</div>
            </div>
        </div>

        <!-- RIGHT: THREAT INTELLIGENCE -->
        <div class="threat-section">
            <div class="threat-panel">
                <h2>Threat Intelligence</h2>
                
                <div class="gauge-container">
                    <div class="gauge-body"></div>
                    <div class="gauge-fill" id="globalGauge"></div>
                    <div class="gauge-value" id="globalThreatValue">0</div>
                </div>

                <div class="threat-status">
                    <div class="status-label" id="threatLabel">SYSTEM NORMAL</div>
                    <div class="factor-breakdown" id="factorText">
                        Base 0.1 × Context 1.0 × Novelty 1.0 = 10
                    </div>
                </div>

                <div class="trend-chart">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>

        <!-- BOTTOM: RECENT ALERTS -->
        <div class="bottom-section">
            <h2>
                Recent Activity Log
                <button class="btn-action" style="font-size: 0.7rem;" onclick="fetchAlerts()"><i class="fas fa-sync"></i> Refresh</button>
            </h2>
            <div style="overflow-x: auto;">
                <table class="alerts-table">
                    <thead>
                        <tr>
                            <th>Level</th>
                            <th>Timestamp</th>
                            <th>Camera</th>
                            <th>Behavior</th>
                            <th>Score</th>
                            <th>Controls</th>
                        </tr>
                    </thead>
                    <tbody id="alertHistoryTableBody">
                        <tr><td colspan="6" style="text-align: center; padding: 30px; color: var(--text-dim);">No recent activity detected.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./dashboard.js"></script>
</body>
</html>
