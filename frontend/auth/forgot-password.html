<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password | PREACT VISION</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{
    height:100vh;
    background:url('background.png') center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
}
body::before{
    content:'';
    position:absolute;
    inset:0;
    background:rgba(5,15,30,0.75);
    backdrop-filter:blur(6px);
}
.container{
    position:relative;
    z-index:1;
    width:430px;
    padding:40px;
    border-radius:18px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
}
h1{text-align:center;font-size:24px;margin-bottom:6px;}
p{text-align:center;font-size:13px;opacity:.8;margin-bottom:25px;}
.group{margin-bottom:16px;}
label{font-size:13px;opacity:.8;display:block;margin-bottom:6px;}
input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    background:rgba(255,255,255,.15);
    color:#fff;
}
.row{
    display:flex;
    gap:10px;
}
.otp-btn{
    width:130px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:#fff;
    cursor:pointer;
    font-size:13px;
}
button.main{
    width:100%;
    padding:13px;
    border:none;
    border-radius:30px;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:#fff;
    margin-top:10px;
}
.msg{font-size:12px;margin-top:5px;color:#ffb3b3;}
.success{color:#7CFF9B;}
.links{text-align:center;margin-top:15px;font-size:13px;}
.links a{color:#00c6ff;text-decoration:none;}
</style>
</head>

<body>

<div class="container">
<h1>Reset Password</h1>
<p>Verify your account and set a new password</p>

<div class="group">
<label>Email / Username</label>
<input id="userInput" placeholder="Enter registered email or username">
<div id="userMsg" class="msg"></div>
</div>

<div class="group">
<label>OTP</label>
<div class="row">
<input id="otp" placeholder="Enter OTP">
<button id="otpBtn" class="otp-btn" onclick="sendOTP()">Send OTP</button>
</div>
<div id="otpMsg" class="msg"></div>
</div>

<div class="group">
<label>New Password</label>
<input type="password" id="pass1">
</div>

<div class="group">
<label>Confirm Password</label>
<input type="password" id="pass2">
<div id="passMsg" class="msg"></div>
</div>

<button class="main" onclick="updatePassword()">Update Password</button>

<div class="links">
<a href="resend-otp.html">Didn’t receive code?</a> |
<a href="index.html">Back to Login</a>
</div>
</div>
<script>
const API_BASE = "http://127.0.0.1:5000/api/auth";
let otpRequestSent = false; // Flag to track if OTP request was successfully sent

async function sendOTP() {
  const email = userInput.value.trim();
  if (!email) {
    userMsg.textContent = "Please enter your email.";
    userMsg.className = "msg";
    return;
  }

  otpBtn.disabled = true; // Disable button to prevent multiple requests
  userMsg.textContent = "Sending OTP...";
  userMsg.className = "msg";

  try {
    const res = await fetch(`${API_BASE}/forgot-password/request-otp`, { // Updated URL
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (!res.ok) {
      userMsg.textContent = data.error || "Failed to send OTP.";
      userMsg.className = "msg";
      otpBtn.disabled = false;
      return;
    }

    otpRequestSent = true;
    userMsg.textContent = data.message || "OTP sent successfully!";
    userMsg.className = "msg success";
    otpBtn.textContent = "Resend OTP"; // Change button text after first send

  } catch (err) {
    console.error("Error sending OTP:", err);
    userMsg.textContent = "Server unavailable. Please try again later.";
    userMsg.className = "msg";
    otpBtn.disabled = false;
  }
}

async function updatePassword() {
  if (!otpRequestSent) {
    otpMsg.textContent = "Please request an OTP first.";
    otpMsg.className = "msg";
    return;
  }

  const email = userInput.value.trim();
  const enteredOtp = otp.value.trim();
  const newPassword = pass1.value;
  const confirmPassword = pass2.value;

  if (!email || !enteredOtp || !newPassword || !confirmPassword) {
    passMsg.textContent = "All fields (Email, OTP, New Password, Confirm Password) are required.";
    passMsg.className = "msg";
    return;
  }

  if (newPassword !== confirmPassword) {
    passMsg.textContent = "Passwords do not match.";
    passMsg.className = "msg";
    return;
  }
  
  if (newPassword.length < 6) { // Example: minimum password length
      passMsg.textContent = "New password must be at least 6 characters long.";
      passMsg.className = "msg";
      return;
  }


  passMsg.textContent = "Resetting password...";
  passMsg.className = "msg";

  try {
    const res = await fetch(`${API_BASE}/forgot-password/reset`, { // Updated URL
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: email,
        otp: enteredOtp,
        new_password: newPassword
      })
    });

    const data = await res.json();

    if (!res.ok) {
      passMsg.textContent = data.error || "Failed to reset password.";
      passMsg.className = "msg";
      return;
    }

    alert(data.message || "Password updated successfully!");
    window.location.href = "index.html"; // Redirect to login page

  } catch (err) {
    console.error("Error updating password:", err);
    passMsg.textContent = "Server unavailable. Please try again later.";
    passMsg.className = "msg";
  }
}
</script>


</body>
</html>
