<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OTP Help | PREACT VISION</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
body{
    height:100vh;
    background:url('background.png') center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:Inter;
    color:#fff;
}
body::before{
    content:'';
    position:absolute;
    inset:0;
    background:rgba(5,15,30,.75);
    backdrop-filter:blur(6px);
}
.popup{
    position:relative;
    z-index:1;
    width:420px;
    padding:30px;
    border-radius:18px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);
}
h2{text-align:center;margin-bottom:10px;}
ul{
    font-size:13px;
    opacity:.85;
    padding-left:18px;
}
li{margin-bottom:8px;}
button{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:30px;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:#fff;
}
</style>
</head>

<body>

<div class="popup">
<h2>Didn’t receive the code?</h2>

<ul>
<li>The email may be delayed due to network issues</li>
<li>Check your spam or junk folder</li>
<li>Ensure your email address is correct</li>
<li>Corporate firewalls may block automated emails</li>
<li>Please wait a few minutes before requesting again</li>
</ul>

<button onclick="history.back()">Close</button>
</div>

</body>
</html>
