<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PREACT VISION</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    height:100vh;
    background:#02040b;
    overflow:hidden;
    font-family:'Orbitron',sans-serif;
    color:#e6f6ff;
}

/* ===== BACKGROUND GRID ===== */
.grid{
    position:absolute;
    inset:0;
    background:
        linear-gradient(rgba(0,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,.04) 1px, transparent 1px);
    background-size:60px 60px;
    animation:gridMove 20s linear infinite;
}
@keyframes gridMove{
    from{background-position:0 0}
    to{background-position:60px 60px}
}

/* ===== RADAR RINGS ===== */
.radar{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
}
.ring{
    position:absolute;
    border:1px solid rgba(0,255,255,.25);
    border-radius:50%;
    animation:pulse 4s ease-out infinite;
}
.ring:nth-child(1){width:300px;height:300px}
.ring:nth-child(2){width:500px;height:500px;animation-delay:1s}
.ring:nth-child(3){width:700px;height:700px;animation-delay:2s}

@keyframes pulse{
    0%{transform:scale(.7);opacity:0}
    40%{opacity:.6}
    100%{transform:scale(1.3);opacity:0}
}

/* ===== CENTER TEXT ===== */
.center{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:5;
}
.title{
    font-size:72px;
    letter-spacing:18px;
    font-weight:700;
    opacity:0;
    animation:reveal 1.8s ease forwards 1.2s;
}
.subtitle{
    margin-top:14px;
    letter-spacing:10px;
    font-size:14px;
    opacity:0;
    animation:reveal 1.8s ease forwards 2.2s;
}
@keyframes reveal{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
}

/* ===== SCAN BAR ===== */
.scan{
    position:absolute;
    width:100%;
    height:3px;
    background:linear-gradient(90deg,transparent,#00ffff,transparent);
    animation:scanMove 3s linear infinite;
    opacity:.7;
}
@keyframes scanMove{
    from{top:-5%}
    to{top:105%}
}

/* ===== BOOT TEXT ===== */
.boot{
    position:absolute;
    bottom:80px;
    width:100%;
    text-align:center;
    font-size:12px;
    letter-spacing:3px;
    opacity:.7;
    animation:flicker 1.5s infinite alternate;
}
@keyframes flicker{
    from{opacity:.4}
    to{opacity:.8}
}

/* ===== FADE OUT ===== */
.fade{
    position:absolute;
    inset:0;
    background:#02040b;
    opacity:0;
    animation:fadeOut 2s ease forwards 6.5s;
    z-index:10;
}
@keyframes fadeOut{
    to{opacity:1}
}
</style>
</head>

<body>

<div class="grid"></div>
<div class="scan"></div>

<div class="radar">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
</div>

<div class="center">
    <div class="title">PREACT</div>
    <div class="subtitle">VISION</div>
</div>

<div class="boot">
    INITIALIZING AI SURVEILLANCE CORE
</div>

<div class="fade"></div>

<script>
setTimeout(()=>{
    window.location.href="frontend/splash/splash.html";
},8500);
</script>

</body>
</html>
